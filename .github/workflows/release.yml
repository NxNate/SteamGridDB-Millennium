name: Build Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build plugin
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        run: pnpm run build

      - name: Package plugin
        shell: bash
        run: |
          set -euo pipefail
          rm -rf release
          mkdir -p release/SteamGridDB
          cp plugin.json package.json pnpm-lock.yaml README.md tsconfig.json release/SteamGridDB/
          cp -R backend frontend .millennium release/SteamGridDB/
          if [ -f settings.json ]; then
            cp settings.json release/SteamGridDB/
          fi
          cd release
          zip -r SteamGridDB-Millennium.zip SteamGridDB

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: SteamGridDB-Millennium
          path: release/SteamGridDB-Millennium.zip

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: release/SteamGridDB-Millennium.zip
